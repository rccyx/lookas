name: CI

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - uses: ./.github/actions/base-runner

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: cargo publish
